$:
  tag_push:
    docker-build:
      name: Docker Build and Push
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      services:
        - name: docker
          options:
            rootlessBuildkitd:
              enabled: true
      env:
        IMAGE_URL: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}

      stages:
        - name: Check version tag
          script: echo "$CNB_BRANCH" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'

        - name: Login to CNB Docker registry
          script: printf "%s" "$CNB_TOKEN" | docker login -u "$CNB_TOKEN_USER_NAME" --password-stdin "$CNB_DOCKER_REGISTRY"

        - name: Build and push multi-arch image
          timeout: 1h
          script: |
            docker buildx build --push --platform linux/amd64,linux/arm64 \
              -t $IMAGE_URL:${CNB_BRANCH#v} -t $IMAGE_URL:latest \
              -f ./Dockerfile .
